config:\n  target: 'http://localhost:3000'\n  phases:\n    - duration: 60\n      arrivalRate: 10\n      rampTo: 100\n      name: 'Ramp-up Phase: 10 to 100 RPS over 60 seconds'\n    - duration: 300\n      arrivalRate: 100\n      name: 'Sustained Load: 100 RPS for 5 minutes'\n    - duration: 60\n      arrivalRate: 100\n      rampTo: 0\n      name: 'Ramp-down Phase: 100 to 0 RPS over 60 seconds'\n  processor: './processor.js'\n  variables:\n    orgIds:\n      - 'test-org-stress-1'\n      - 'test-org-stress-2'\n      - 'test-org-stress-3'\n      - 'test-org-stress-4'\n      - 'test-org-stress-5'\n  defaults:\n    headers:\n      Content-Type: 'application/json'\n      Accept: 'application/json'\n  timeout: 10\n  http:\n    timeout: 10000\n\nscenarios:\n  - name: 'Engine Resolution Stress Test'\n    weight: 40\n    flow:\n      - post:\n          url: '/api/trpc/aiEngines.list?batch=1'\n          json:\n            0:\n              jsonrpc: '2.0'\n              method: 'aiEngines.list'\n              params:\n                input:\n                  orgId: '{{ orgIds[0] }}'\n              id: 0\n          expect:\n            - statusCode: 200\n            - contentType: json\n\n  - name: 'Routing Rule Resolution Stress Test'\n    weight: 35\n    flow:\n      - post:\n          url: '/api/trpc/aiRouting.list?batch=1'\n          json:\n            0:\n              jsonrpc: '2.0'\n              method: 'aiRouting.list'\n              params:\n                input:\n                  orgId: '{{ orgIds[1] }}'\n                  useCase: 'DRIVE_DIAG'\n              id: 0\n          expect:\n            - statusCode: 200\n            - contentType: json\n\n  - name: 'Primary Engine Lookup Stress Test'\n    weight: 25\n    flow:\n      - post:\n          url: '/api/trpc/aiEngines.list?batch=1'\n          json:\n            0:\n              jsonrpc: '2.0'\n              method: 'aiEngines.list'\n              params:\n                input:\n                  orgId: '{{ orgIds[2] }}'\n                  primaryOnly: true\n              id: 0\n          expect:\n            - statusCode: 200\n            - contentType: json\n
