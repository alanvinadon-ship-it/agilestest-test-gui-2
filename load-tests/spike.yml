config:\n  target: 'http://localhost:3000'\n  phases:\n    - duration: 60\n      arrivalRate: 10\n      name: 'Baseline: 10 RPS for 1 minute'\n    - duration: 10\n      arrivalRate: 10\n      rampTo: 150\n      name: 'Spike: Jump to 150 RPS in 10 seconds'\n    - duration: 60\n      arrivalRate: 150\n      name: 'Sustained Spike: 150 RPS for 1 minute'\n    - duration: 30\n      arrivalRate: 150\n      rampTo: 10\n      name: 'Recovery: Back to 10 RPS in 30 seconds'\n    - duration: 60\n      arrivalRate: 10\n      name: 'Baseline: 10 RPS for 1 minute'\n  processor: './processor.js'\n  variables:\n    orgIds:\n      - 'test-org-spike-1'\n      - 'test-org-spike-2'\n      - 'test-org-spike-3'\n  defaults:\n    headers:\n      Content-Type: 'application/json'\n      Accept: 'application/json'\n  timeout: 10\n  http:\n    timeout: 10000\n\nscenarios:\n  - name: 'Engine Resolution Spike Test'\n    weight: 50\n    flow:\n      - post:\n          url: '/api/trpc/aiEngines.list?batch=1'\n          json:\n            0:\n              jsonrpc: '2.0'\n              method: 'aiEngines.list'\n              params:\n                input:\n                  orgId: '{{ orgIds[0] }}'\n              id: 0\n          expect:\n            - statusCode: 200\n            - contentType: json\n\n  - name: 'Routing Resolution Spike Test'\n    weight: 50\n    flow:\n      - post:\n          url: '/api/trpc/aiRouting.list?batch=1'\n          json:\n            0:\n              jsonrpc: '2.0'\n              method: 'aiRouting.list'\n              params:\n                input:\n                  orgId: '{{ orgIds[1] }}'\n                  useCase: 'DRIVE_DIAG'\n              id: 0\n          expect:\n            - statusCode: 200\n            - contentType: json\n
