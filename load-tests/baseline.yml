config:\n  target: 'http://localhost:3000'\n  phases:\n    - duration: 30\n      arrivalRate: 1\n      name: 'Baseline - Single Request per Second'\n  processor: './processor.js'\n  variables:\n    orgIds:\n      - 'test-org-baseline-1'\n      - 'test-org-baseline-2'\n      - 'test-org-baseline-3'\n  defaults:\n    headers:\n      Content-Type: 'application/json'\n      Accept: 'application/json'\n\nscenarios:\n  - name: 'Engine Resolution Baseline'\n    flow:\n      - post:\n          url: '/api/trpc/aiEngines.list?batch=1'\n          json:\n            0:\n              jsonrpc: '2.0'\n              method: 'aiEngines.list'\n              params:\n                input:\n                  orgId: '{{ orgIds[0] }}'\n              id: 0\n          capture:\n            - json: '$.result.data[0].duration'\n              as: 'latency'\n          expect:\n            - statusCode: 200\n            - contentType: json\n          think: 1\n\n  - name: 'Engine Resolution with Conditions'\n    flow:\n      - post:\n          url: '/api/trpc/aiRouting.list?batch=1'\n          json:\n            0:\n              jsonrpc: '2.0'\n              method: 'aiRouting.list'\n              params:\n                input:\n                  orgId: '{{ orgIds[1] }}'\n                  useCase: 'DRIVE_DIAG'\n              id: 0\n          capture:\n            - json: '$.result.data[0].duration'\n              as: 'latency'\n          expect:\n            - statusCode: 200\n            - contentType: json\n          think: 1\n\n  - name: 'Primary Engine Lookup'\n    flow:\n      - post:\n          url: '/api/trpc/aiEngines.list?batch=1'\n          json:\n            0:\n              jsonrpc: '2.0'\n              method: 'aiEngines.list'\n              params:\n                input:\n                  orgId: '{{ orgIds[2] }}'\n                  primaryOnly: true\n              id: 0\n          capture:\n            - json: '$.result.data[0].duration'\n              as: 'latency'\n          expect:\n            - statusCode: 200\n            - contentType: json\n          think: 1\n
