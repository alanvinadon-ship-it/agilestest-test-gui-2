version: '3.8'\n\nservices:\n  # Keycloak Identity Provider\n  keycloak:\n    image: quay.io/keycloak/keycloak:latest\n    container_name: agilestest-keycloak\n    environment:\n      # Admin credentials\n      KEYCLOAK_ADMIN: admin\n      KEYCLOAK_ADMIN_PASSWORD: admin123\n\n      # Database configuration\n      KC_DB: mysql\n      KC_DB_URL: jdbc:mysql://mysql:3306/keycloak\n      KC_DB_USERNAME: keycloak\n      KC_DB_PASSWORD: keycloak123\n\n      # HTTPS/TLS (disable for development)\n      KC_HTTPS_ENABLED: \"false\"\n\n      # Hostname\n      KC_HOSTNAME: localhost\n      KC_HOSTNAME_PORT: 8080\n      KC_HOSTNAME_STRICT: \"false\"\n\n      # Proxy settings\n      KC_PROXY: edge\n\n      # Logging\n      KC_LOG_LEVEL: INFO\n      KC_LOG_CONSOLE_OUTPUT: json\n\n    ports:\n      - \"8080:8080\"\n\n    command:\n      - \"start-dev\"\n\n    depends_on:\n      mysql:\n        condition: service_healthy\n\n    networks:\n      - agilestest-network\n\n    healthcheck:\n      test: [\"CMD\", \"curl\", \"-f\", \"http://localhost:8080/health/ready\"]\n      interval: 10s\n      timeout: 5s\n      retries: 5\n      start_period: 30s\n\n  # MySQL Database for Keycloak\n  mysql:\n    image: mysql:8.0\n    container_name: agilestest-mysql\n    environment:\n      MYSQL_ROOT_PASSWORD: root123\n      MYSQL_DATABASE: keycloak\n      MYSQL_USER: keycloak\n      MYSQL_PASSWORD: keycloak123\n\n    ports:\n      - \"3306:3306\"\n\n    volumes:\n      - mysql_data:/var/lib/mysql\n      - ./scripts/init-keycloak.sql:/docker-entrypoint-initdb.d/init.sql\n\n    networks:\n      - agilestest-network\n\n    healthcheck:\n      test: [\"CMD\", \"mysqladmin\", \"ping\", \"-h\", \"localhost\"]\n      interval: 10s\n      timeout: 5s\n      retries: 5\n\nvolumes:\n  mysql_data:\n    driver: local\n\nnetworks:\n  agilestest-network:\n    driver: bridge\n
