# ============================================================================
# AgilesTest — Docker Compose Local Validation
# Uses pre-built image + host network (sandbox iptables workaround)
# Usage: docker compose -f docker-compose.local-test.yml --env-file .env.prod up -d
# ============================================================================

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    network_mode: host
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-agilestest}
      MYSQL_USER: ${MYSQL_USER:-agilestest}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_TCP_PORT: ${MYSQL_PORT:-3307}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-P", "${MYSQL_PORT:-3307}", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    network_mode: host
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  minio-init:
    image: minio/mc:latest
    network_mode: host
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set myminio http://127.0.0.1:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD} &&
        mc mb --ignore-existing myminio/$${S3_BUCKET:-agilestest-artifacts} &&
        echo 'Bucket ready'
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET:-agilestest-artifacts}

  backend:
    image: agilestest:latest
    restart: unless-stopped
    network_mode: host
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: mysql://${MYSQL_USER:-agilestest}:${MYSQL_PASSWORD}@127.0.0.1:${MYSQL_PORT:-3307}/${MYSQL_DATABASE:-agilestest}
      JWT_SECRET: ${JWT_SECRET:-test-jwt-secret}
      S3_ENDPOINT: http://127.0.0.1:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET:-agilestest-artifacts}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_FORCE_PATH_STYLE: "true"
      S3_PUBLIC_URL: http://127.0.0.1:9000
      RETENTION_DAYS_ARTIFACTS: ${RETENTION_DAYS_ARTIFACTS:-90}
      RETENTION_DAYS_RUNS: ${RETENTION_DAYS_RUNS:-180}
      RETENTION_DAYS_SESSIONS: ${RETENTION_DAYS_SESSIONS:-30}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      METRICS_ENABLED: "true"
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3001}
    depends_on:
      mysql:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully

volumes:
  mysql_data:
    driver: local
  minio_data:
    driver: local
