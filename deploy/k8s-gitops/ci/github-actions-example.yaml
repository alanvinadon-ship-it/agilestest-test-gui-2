# ─── AgilesTest — CI/CD Pipeline Example (GitHub Actions) ────────────────
# Ce fichier est un EXEMPLE. Adapter les variables et secrets selon
# l'infrastructure Orange.
# ─────────────────────────────────────────────────────────────────────────
name: AgilesTest CI/CD

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/agilestest

jobs:
  # ── Build & Push Images ────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - name: frontend
            dockerfile: deploy/compose/Dockerfile.frontend
            context: .
          - name: orchestration
            dockerfile: deploy/compose/Dockerfile.orchestration
            context: .
          - name: runner
            dockerfile: runner-agent/Dockerfile
            context: runner-agent
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Update Helm Values (GitOps) ───────────────────────────────────────
  update-gitops:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "overlay=pilot_orange" >> $GITHUB_OUTPUT
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "overlay=dev" >> $GITHUB_OUTPUT
            echo "tag=dev-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          fi

      - name: Update Helm values tag
        run: |
          OVERLAY=${{ steps.env.outputs.overlay }}
          TAG=${{ steps.env.outputs.tag }}
          VALUES_FILE="deploy/k8s-gitops/gitops/overlays/${OVERLAY}/values-${OVERLAY}.yaml"
          sed -i "s/tag: .*/tag: \"${TAG}\"/" "${VALUES_FILE}"

      - name: Commit and push
        run: |
          git config user.name "CI Bot"
          git config user.email "ci@agilestest.io"
          git add .
          git diff --staged --quiet || git commit -m "ci: update ${OVERLAY} to ${TAG}"
          git push

  # ── Smoke Test ─────────────────────────────────────────────────────────
  smoke-test:
    needs: update-gitops
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Wait for ArgoCD sync
        run: sleep 60

      - name: Run smoke test
        run: |
          echo "Smoke test would run against the deployed environment"
          echo "In production, use: kubectl apply -f smoke-test-job.yaml"
