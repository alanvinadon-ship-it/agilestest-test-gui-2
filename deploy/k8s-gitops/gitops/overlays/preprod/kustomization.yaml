# ─── AgilesTest — Overlay PREPROD ────────────────────────────────────────
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: agilestest-preprod

commonLabels:
  environment: preprod

resources: []

configMapGenerator:
  - name: agilestest-feature-flags
    literals:
      - ENABLE_DRIVE_TEST=true
      - ENABLE_PROBE_CAPTURE=true
      - ENABLE_AI_REPAIR=true
      - ENABLE_NOTIFICATIONS=true
      - LOG_LEVEL=info
