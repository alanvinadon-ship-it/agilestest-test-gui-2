# ─── AgilesTest — Values PILOT ORANGE ────────────────────────────────────
global:
  tag: "1.0.0"
  domain: agilestest.orange.ci
  tls:
    enabled: true
    secretName: agilestest-orange-tls
  minio:
    bucket: agilestest-artifacts-orange

frontend:
  replicaCount: 2
  ingress:
    enabled: true
    className: nginx
    annotations:
      nginx.ingress.kubernetes.io/proxy-body-size: "200m"
      cert-manager.io/cluster-issuer: letsencrypt-prod
  env:
    VITE_APP_TITLE: "AgilesTest — Pilote Orange"

orchestration:
  replicaCount: 2
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi

runner-agent:
  replicaCount: 2
  env:
    RUNNER_ID: runner-orange-01
    POLL_INTERVAL_MS: "3000"
  resources:
    requests:
      cpu: "1"
      memory: 1Gi
    limits:
      cpu: "4"
      memory: 4Gi

minio:
  persistence:
    enabled: true
    size: 100Gi
    storageClass: ssd-premium
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi

autoscaling:
  enabled: false
