# ─── AgilesTest — Overlay PILOT ORANGE ───────────────────────────────────
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: agilestest-pilot-orange

commonLabels:
  environment: pilot-orange
  customer: orange-ci

resources: []

configMapGenerator:
  - name: agilestest-feature-flags
    literals:
      - ENABLE_DRIVE_TEST=true
      - ENABLE_PROBE_CAPTURE=true
      - ENABLE_AI_REPAIR=true
      - ENABLE_NOTIFICATIONS=true
      - ENABLE_SMS_ORANGE=true
      - ENABLE_AUTO_INCIDENTS=true
      - LOG_LEVEL=info
      - RETENTION_DAYS=90
