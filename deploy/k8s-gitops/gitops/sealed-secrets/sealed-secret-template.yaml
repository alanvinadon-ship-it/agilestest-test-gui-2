# ─── SealedSecret Template ───────────────────────────────────────────────
# Ce fichier est un TEMPLATE. Générer le vrai SealedSecret avec kubeseal.
# NE PAS committer de secrets en clair dans ce répertoire.
# ─────────────────────────────────────────────────────────────────────────
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: agilestest-secrets
  namespace: agilestest-pilot-orange
  annotations:
    sealedsecrets.bitnami.com/managed: "true"
spec:
  encryptedData:
    jwt-secret: "<SEALED_VALUE>"
    minio-access-key: "<SEALED_VALUE>"
    minio-secret-key: "<SEALED_VALUE>"
  template:
    metadata:
      name: agilestest-secrets
      namespace: agilestest-pilot-orange
    type: Opaque
