apiVersion: v1
kind: Service
metadata:
  name: {{ include "orchestration.fullname" . }}
  labels:
    app.kubernetes.io/name: orchestration
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.port | default 4000 }}
      targetPort: 4000
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: orchestration
    app.kubernetes.io/instance: {{ .Release.Name }}
