apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  labels:
    app.kubernetes.io/name: agilestest
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
data:
  jwt-secret: {{ .Values.global.jwt.secret | b64enc }}
  minio-access-key: {{ .Values.global.minio.accessKey | b64enc }}
  minio-secret-key: {{ .Values.global.minio.secretKey | b64enc }}
