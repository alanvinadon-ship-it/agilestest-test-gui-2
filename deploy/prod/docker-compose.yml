# ============================================================================
# AgilesTest — Docker Compose Production (host network mode)
# ============================================================================
services:
  # ── MySQL Database ────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: prod-mysql-1
    restart: unless-stopped
    network_mode: host
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-agilestest}
      MYSQL_USER: ${MYSQL_USER:-agilestest}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_TCP_PORT: ${MYSQL_PORT:-3307}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-P", "${MYSQL_PORT:-3307}", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ── MinIO (S3-compatible object storage) ──────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: prod-minio-1
    restart: unless-stopped
    network_mode: host
    command: server /data --address ":9000" --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── Backend (Express + tRPC + static frontend) ───────────────────────────
  backend:
    build:
      context: ../../
      dockerfile: Dockerfile
      target: production
    container_name: prod-backend-1
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: mysql://${MYSQL_USER:-agilestest}:${MYSQL_PASSWORD}@127.0.0.1:${MYSQL_PORT:-3307}/${MYSQL_DATABASE:-agilestest}
      S3_ENDPOINT: http://127.0.0.1:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET:-agilestest-artifacts}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-http://192.168.200.83:9000}
      AI_CONFIG_MASTER_KEY_FILE: /run/secrets/ai_config_master_key
      KEYCLOAK_URL: http://127.0.0.1:8180
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-agilestest}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-agilestest-app}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-agilestest-secret}
    secrets:
      - ai_config_master_key
    depends_on:
      mysql:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ── Keycloak (Identity Provider) ──────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: prod-keycloak-1
    restart: unless-stopped
    network_mode: host
    command: start-dev --http-port=8180
    environment:
      KC_DB: mysql
      KC_DB_URL: jdbc:mysql://127.0.0.1:${MYSQL_PORT:-3307}/${KEYCLOAK_DB:-keycloak}
      KC_DB_USERNAME: root
      KC_DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8180 && echo done"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s

secrets:
  ai_config_master_key:
    file: ../docker/secrets/ai_config_master_key.txt

volumes:
  mysql_data:
  minio_data:
