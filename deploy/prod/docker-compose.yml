# ============================================================================
# AgilesTest — Docker Compose Sandbox (host network mode)
# Adapted for environments without iptables support
# ============================================================================
services:
  # ── MySQL Database ────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    network_mode: host
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-agilestest}
      MYSQL_USER: ${MYSQL_USER:-agilestest}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_TCP_PORT: ${MYSQL_PORT:-3307}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-P", "${MYSQL_PORT:-3307}", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # ── MinIO (S3-compatible object storage) ──────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    network_mode: host
    command: server /data --address ":9000" --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── MinIO bucket init (one-shot) ──────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    network_mode: host
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set myminio http://127.0.0.1:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD} &&
        mc mb --ignore-existing myminio/$${S3_BUCKET:-agilestest-artifacts} &&
        mc anonymous set download myminio/$${S3_BUCKET:-agilestest-artifacts}/public/ &&
        echo 'Bucket ready'
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET:-agilestest-artifacts}

  # ── Database migrations (one-shot) ────────────────────────────────────────
  db-migrate:
    build:
      context: ../../
      dockerfile: Dockerfile
      target: builder
    network_mode: host
    command: >
      sh -c "
        npx drizzle-kit generate && npx drizzle-kit migrate &&
        echo 'Migrations applied successfully'
      "
    environment:
      DATABASE_URL: mysql://${MYSQL_USER:-agilestest}:${MYSQL_PASSWORD}@127.0.0.1:${MYSQL_PORT:-3307}/${MYSQL_DATABASE:-agilestest}
    depends_on:
      mysql:
        condition: service_healthy

  # ── Backend (Express + tRPC + static frontend) ───────────────────────────
  backend:
    build:
      context: ../../
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      PORT: 3000
      VITE_APP_ID: ${VITE_APP_ID:-agilestest-local}
      DATABASE_URL: mysql://${MYSQL_USER:-agilestest}:${MYSQL_PASSWORD}@127.0.0.1:${MYSQL_PORT:-3307}/${MYSQL_DATABASE:-agilestest}
      # MinIO / S3
      S3_ENDPOINT: http://127.0.0.1:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET:-agilestest-artifacts}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_FORCE_PATH_STYLE: "true"
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-http://localhost:9000}
      # Retention
      RETENTION_DAYS_ARTIFACTS: ${RETENTION_DAYS_ARTIFACTS:-90}
      RETENTION_DAYS_RUNS: ${RETENTION_DAYS_RUNS:-180}
      RETENTION_DAYS_SESSIONS: ${RETENTION_DAYS_SESSIONS:-30}
      # Observability
      LOG_LEVEL: ${LOG_LEVEL:-info}
      METRICS_ENABLED: "true"
      # AI Config — master key via Docker secret
      AI_CONFIG_MASTER_KEY_FILE: /run/secrets/ai_config_master_key
      # Keycloak
      KEYCLOAK_URL: http://127.0.0.1:8180
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-agilestest}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-agilestest-app}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-agilestest-secret}
      KEYCLOAK_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      KEYCLOAK_GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      ENCRYPTION_MASTER_KEY: ${ENCRYPTION_MASTER_KEY}
    secrets:
      - ai_config_master_key
    depends_on:
      mysql:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully

  # ── Keycloak (Identity Provider) ──────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    restart: unless-stopped
    network_mode: host
    command: start-dev --http-port=8180
    environment:
      KC_DB: mysql
      KC_DB_URL: jdbc:mysql://127.0.0.1:${MYSQL_PORT:-3307}/${KEYCLOAK_DB:-keycloak}
      KC_DB_USERNAME: root
      KC_DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HOSTNAME_STRICT: "false"
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8180 && echo done"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s

  # ── Keycloak realm init (one-shot) ──────────────────────────────────────────
  keycloak-init:
    image: curlimages/curl:latest
    network_mode: host
    depends_on:
      keycloak:
        condition: service_healthy
    entrypoint: ["/bin/sh", "/scripts/keycloak-init.sh"]
    volumes:
      - ./deploy/keycloak/keycloak-init.sh:/scripts/keycloak-init.sh:ro
    environment:
      KEYCLOAK_URL: http://127.0.0.1:8180
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-agilestest}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-agilestest-app}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-agilestest-secret}
      APP_URL: ${APP_URL:-http://localhost:8080}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}

  # ── Nginx reverse proxy ──────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./nginx/nginx-sandbox.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend

secrets:
  ai_config_master_key:
    file: ./deploy/docker/secrets/ai_config_master_key.txt

volumes:
  mysql_data:
    driver: local
  minio_data:
    driver: local
  keycloak_data:
    driver: local
