version: '3.9'

services:
  # ─── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: agilestest-frontend
    environment:
      - VITE_APP_TITLE=${VITE_APP_TITLE:-AgilesTest}
      - VITE_APP_LOGO=${VITE_APP_LOGO:-}
      - VITE_ANALYTICS_ENDPOINT=${VITE_ANALYTICS_ENDPOINT:-}
      - VITE_ANALYTICS_WEBSITE_ID=${VITE_ANALYTICS_WEBSITE_ID:-}
      - VITE_OAUTH_PORTAL_URL=${VITE_OAUTH_PORTAL_URL:-}
    ports:
      - "3000:3000"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      nginx:
        condition: service_healthy
    restart: unless-stopped

  # ─── Postgres Database ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: agilestest-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-agilestest}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-agilestest_prod_secret}
      POSTGRES_DB: ${DB_NAME:-agilestest_prod}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-agilestest} -d ${DB_NAME:-agilestest_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ─── MinIO (S3-compatible object storage) ──────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-01-31T20-20-33Z
    container_name: agilestest-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin_prod_secret}
      MINIO_BROWSER: ${MINIO_BROWSER:-on}
    volumes:
      - ./data/minio:/minio_data
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    networks:
      - internal
    command: server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ─── Admin API (port 3001, internal only) ──────────────────────────────────
  admin-api:
    build:
      context: .
      dockerfile: services/admin-api/Dockerfile
      args:
        - NODE_ENV=production
    container_name: agilestest-admin-api
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-agilestest}
      - DB_PASSWORD=${DB_PASSWORD:-agilestest_prod_secret}
      - DB_NAME=${DB_NAME:-agilestest_prod}
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-prod}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-24h}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin_prod_secret}
      - MINIO_BUCKET=${MINIO_BUCKET:-agilestest-artifacts}
      - MINIO_USE_SSL=false
      - LOG_LEVEL=${LOG_LEVEL:-info}
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  # ─── Repository API (port 3002, internal only) ────────────────────────────
  repository-api:
    build:
      context: .
      dockerfile: services/repository-api/Dockerfile
      args:
        - NODE_ENV=production
    container_name: agilestest-repository-api
    environment:
      - NODE_ENV=production
      - PORT=3002
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-agilestest}
      - DB_PASSWORD=${DB_PASSWORD:-agilestest_prod_secret}
      - DB_NAME=${DB_NAME:-agilestest_prod}
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-prod}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin_prod_secret}
      - MINIO_BUCKET=${MINIO_BUCKET:-agilestest-artifacts}
      - MINIO_USE_SSL=false
      - LOG_LEVEL=${LOG_LEVEL:-info}
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  # ─── Orchestration API (port 3003, internal only) ────────────────────────
  orchestration-api:
    build:
      context: .
      dockerfile: services/orchestration-api/Dockerfile
      args:
        - NODE_ENV=production
    container_name: agilestest-orchestration-api
    environment:
      - NODE_ENV=production
      - PORT=3003
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-agilestest}
      - DB_PASSWORD=${DB_PASSWORD:-agilestest_prod_secret}
      - DB_NAME=${DB_NAME:-agilestest_prod}
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-prod}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin_prod_secret}
      - MINIO_BUCKET=${MINIO_BUCKET:-agilestest-artifacts}
      - MINIO_USE_SSL=false
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - RUNNER_ENDPOINT=${RUNNER_ENDPOINT:-http://runner:4000}
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  # ─── Collector API (port 3004, internal only) ─────────────────────────────
  collector-api:
    build:
      context: .
      dockerfile: services/collector-api/Dockerfile
      args:
        - NODE_ENV=production
    container_name: agilestest-collector-api
    environment:
      - NODE_ENV=production
      - PORT=3004
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-agilestest}
      - DB_PASSWORD=${DB_PASSWORD:-agilestest_prod_secret}
      - DB_NAME=${DB_NAME:-agilestest_prod}
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-prod}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin_prod_secret}
      - MINIO_BUCKET=${MINIO_BUCKET:-agilestest-artifacts}
      - MINIO_USE_SSL=false
      - MAX_UPLOAD_SIZE=${MAX_UPLOAD_SIZE:-500m}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3004/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  # ─── Analysis API (port 3005, internal only) ──────────────────────────────
  analysis-api:
    build:
      context: .
      dockerfile: services/analysis-api/Dockerfile
      args:
        - NODE_ENV=production
    container_name: agilestest-analysis-api
    environment:
      - NODE_ENV=production
      - PORT=3005
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-agilestest}
      - DB_PASSWORD=${DB_PASSWORD:-agilestest_prod_secret}
      - DB_NAME=${DB_NAME:-agilestest_prod}
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-prod}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin_prod_secret}
      - MINIO_BUCKET=${MINIO_BUCKET:-agilestest-artifacts}
      - MINIO_USE_SSL=false
      - LOG_LEVEL=${LOG_LEVEL:-info}
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3005/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  # ─── Reporting API (port 3006, internal only) ─────────────────────────────
  reporting-api:
    build:
      context: .
      dockerfile: services/reporting-api/Dockerfile
      args:
        - NODE_ENV=production
    container_name: agilestest-reporting-api
    environment:
      - NODE_ENV=production
      - PORT=3006
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-agilestest}
      - DB_PASSWORD=${DB_PASSWORD:-agilestest_prod_secret}
      - DB_NAME=${DB_NAME:-agilestest_prod}
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-prod}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin_prod_secret}
      - MINIO_BUCKET=${MINIO_BUCKET:-agilestest-artifacts}
      - MINIO_USE_SSL=false
      - LOG_LEVEL=${LOG_LEVEL:-info}
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3006/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  # ─── Nginx Reverse Proxy (seul point d'entrée public) ──────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: agilestest-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/agilestest.conf:/etc/nginx/conf.d/agilestest.conf:ro
      - ./certs:/etc/nginx/certs:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      - admin-api
      - repository-api
      - orchestration-api
      - collector-api
      - analysis-api
      - reporting-api
      - frontend
    restart: unless-stopped

  # ─── Runner (optional, for test execution) ────────────────────────────────
  runner:
    build:
      context: .
      dockerfile: services/runner/Dockerfile
      args:
        - NODE_ENV=production
    container_name: agilestest-runner
    environment:
      - NODE_ENV=production
      - PORT=4000
      - ORCHESTRATION_API_URL=http://orchestration-api:3003
      - COLLECTOR_API_URL=http://collector-api:3004
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin_prod_secret}
      - MINIO_BUCKET=${MINIO_BUCKET:-agilestest-artifacts}
      - MINIO_USE_SSL=false
      - LOG_LEVEL=${LOG_LEVEL:-info}
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      minio:
        condition: service_healthy
    restart: unless-stopped

networks:
  internal:
    driver: bridge
    internal: true

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
