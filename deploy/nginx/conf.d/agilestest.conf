# ─── Upstream backends ────────────────────────────────────────────────────────
upstream admin_backend {
  server admin-api:3001;
}

upstream repository_backend {
  server repository-api:3002;
}

upstream orchestration_backend {
  server orchestration-api:3003;
}

upstream collector_backend {
  server collector-api:3004;
}

upstream analysis_backend {
  server analysis-api:3005;
}

upstream reporting_backend {
  server reporting-api:3006;
}

upstream frontend_backend {
  server frontend:3000;
}

# ─── Main server block ─────────────────────────────────────────────────────────
server {
  listen 80;
  server_name _;

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "no-referrer-when-downgrade" always;
  add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

  # ─── Health check endpoint ─────────────────────────────────────────────────
  location /health {
    access_log off;
    return 200 "OK\n";
    add_header Content-Type text/plain;
  }

  # ─── Frontend (default route) ──────────────────────────────────────────────
  location / {
    proxy_pass http://frontend_backend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
    proxy_redirect off;
    proxy_buffering off;
  }

  # ─── Admin API ─────────────────────────────────────────────────────────────
  location /api/admin/ {
    limit_req zone=api_limit burst=50 nodelay;
    
    proxy_pass http://admin_backend/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $server_name;
    
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    
    proxy_buffering off;
    proxy_request_buffering off;
  }

  # ─── Repository API ───────────────────────────────────────────────────────
  location /api/repository/ {
    limit_req zone=api_limit burst=50 nodelay;
    
    proxy_pass http://repository_backend/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $server_name;
    
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    
    proxy_buffering off;
    proxy_request_buffering off;
  }

  # ─── Orchestration API ────────────────────────────────────────────────────
  location /api/orchestration/ {
    limit_req zone=api_limit burst=50 nodelay;
    
    proxy_pass http://orchestration_backend/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $server_name;
    
    proxy_connect_timeout 60s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    
    proxy_buffering off;
    proxy_request_buffering off;
  }

  # ─── Collector API (artifact uploads) ──────────────────────────────────────
  location /api/collector/ {
    limit_req zone=upload_limit burst=20 nodelay;
    
    proxy_pass http://collector_backend/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $server_name;
    
    proxy_connect_timeout 60s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
    
    proxy_buffering off;
    proxy_request_buffering off;
    
    # Allow large file uploads
    client_max_body_size 500m;
  }

  # ─── Analysis API ─────────────────────────────────────────────────────────
  location /api/analysis/ {
    limit_req zone=api_limit burst=50 nodelay;
    
    proxy_pass http://analysis_backend/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $server_name;
    
    proxy_connect_timeout 60s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;
    
    proxy_buffering off;
    proxy_request_buffering off;
  }

  # ─── Reporting API ────────────────────────────────────────────────────────
  location /api/reporting/ {
    limit_req zone=api_limit burst=50 nodelay;
    
    proxy_pass http://reporting_backend/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $server_name;
    
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    
    proxy_buffering off;
    proxy_request_buffering off;
  }

  # ─── Deny access to sensitive files ────────────────────────────────────────
  location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
  }

  location ~ ~$ {
    deny all;
    access_log off;
    log_not_found off;
  }
}

