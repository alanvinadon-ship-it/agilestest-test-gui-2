upstream backend {
    server backend:3000;
}

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;

    # Max upload size (for artifact uploads)
    client_max_body_size 100m;

    # tRPC API
    location /api/trpc {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout 120s;
    }

    # OAuth callback
    location /api/oauth {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
    }

    # Health endpoints (internal)
    location /healthz {
        proxy_pass http://backend;
        proxy_set_header X-Request-ID $request_id;
    }

    location /readyz {
        proxy_pass http://backend;
        proxy_set_header X-Request-ID $request_id;
    }

    # Metrics (protected — restrict to internal network)
    location /metrics {
        # Allow only from Docker internal network or specific IPs
        # Uncomment and adjust for your network:
        # allow 172.16.0.0/12;
        # allow 10.0.0.0/8;
        # deny all;
        proxy_pass http://backend;
        proxy_set_header X-Request-ID $request_id;
    }

    # Frontend static files (served by backend in prod mode)
    location / {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
    }
}
