# ─── AgilesTest Runner Stack ─────────────────────────────────────────────
# docker-compose -f docker-compose.runner.yml up -d
# ─────────────────────────────────────────────────────────────────────────

version: '3.8'

services:
  # ─── MinIO (S3 compatible object storage) ────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: agilestest-minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console UI
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MinIO bucket initialization ─────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: agilestest-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/agilestest-artifacts --ignore-existing;
      mc anonymous set download local/agilestest-artifacts;
      echo 'Bucket agilestest-artifacts ready';
      "
    restart: "no"

  # ─── Orchestration API (mock/stub for local dev) ─────────────────────
  # En production, remplacer par le vrai service Orchestration.
  # Ce stub expose les endpoints minimaux pour le runner.
  orchestration:
    image: node:20-slim
    container_name: agilestest-orchestration
    working_dir: /app
    ports:
      - "4000:4000"
    volumes:
      - ./orchestration-stub:/app
    command: ["node", "server.mjs"]
    environment:
      PORT: 4000
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: agilestest-artifacts
    depends_on:
      minio:
        condition: service_healthy

  # ─── Runner Agent ────────────────────────────────────────────────────
  runner:
    build:
      context: ./runner-agent
      dockerfile: Dockerfile
    container_name: agilestest-runner
    environment:
      RUNNER_ID: runner-docker-01
      ORCHESTRATION_URL: http://orchestration:4000
      POLL_INTERVAL_MS: 5000
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: agilestest-artifacts
      MINIO_USE_SSL: "false"
    depends_on:
      - orchestration
      - minio
    restart: unless-stopped

volumes:
  minio-data:
