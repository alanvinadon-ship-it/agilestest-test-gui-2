# ============================================================================
# AgilesTest — Docker Compose Production
# Usage: docker compose -f docker-compose.prod.yml up -d
# ============================================================================

services:
  # ── MySQL Database ────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-agilestest}
      MYSQL_USER: ${MYSQL_USER:-agilestest}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - agilestest

  # ── MinIO (S3-compatible object storage) ──────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - agilestest

  # ── MinIO bucket init (one-shot) ──────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD} &&
        mc mb --ignore-existing myminio/$${S3_BUCKET:-agilestest-artifacts} &&
        mc anonymous set download myminio/$${S3_BUCKET:-agilestest-artifacts}/public/ &&
        echo 'Bucket ready'
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET:-agilestest-artifacts}
    networks:
      - agilestest

  # ── Database migrations (one-shot) ────────────────────────────────────────
  db-migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    command: >
      sh -c "
        npx drizzle-kit generate && npx drizzle-kit migrate &&
        echo 'Migrations applied successfully'
      "
    environment:
      DATABASE_URL: mysql://${MYSQL_USER:-agilestest}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE:-agilestest}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - agilestest

  # ── Backend (Express + tRPC + static frontend) ───────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: mysql://${MYSQL_USER:-agilestest}:${MYSQL_PASSWORD}@mysql:3306/${MYSQL_DATABASE:-agilestest}
      # MinIO / S3
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET:-agilestest-artifacts}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_FORCE_PATH_STYLE: "true"
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-http://localhost:9000}
      # Retention
      RETENTION_DAYS_ARTIFACTS: ${RETENTION_DAYS_ARTIFACTS:-90}
      RETENTION_DAYS_RUNS: ${RETENTION_DAYS_RUNS:-180}
      RETENTION_DAYS_SESSIONS: ${RETENTION_DAYS_SESSIONS:-30}
      # Observability
      LOG_LEVEL: ${LOG_LEVEL:-info}
      METRICS_ENABLED: "true"
      # AI Config — master key via Docker secret
      AI_CONFIG_MASTER_KEY_FILE: /run/secrets/ai_config_master_key
    secrets:
      - ai_config_master_key
    depends_on:
      mysql:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    networks:
      - agilestest

  # ── Nginx reverse proxy ──────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - agilestest

secrets:
  ai_config_master_key:
    file: ./deploy/docker/secrets/ai_config_master_key.txt

volumes:
  mysql_data:
    driver: local
  minio_data:
    driver: local

networks:
  agilestest:
    driver: bridge
