name: Performance Tests\n\non:\n  push:\n    branches: [main, develop]\n  pull_request:\n    branches: [main, develop]\n  schedule:\n    # Run daily at 2 AM UTC\n    - cron: '0 2 * * *'\n\njobs:\n  performance:\n    runs-on: ubuntu-latest\n    timeout-minutes: 30\n\n    services:\n      mysql:\n        image: mysql:8.0\n        env:\n          MYSQL_ROOT_PASSWORD: root\n          MYSQL_DATABASE: test_db\n        options: >-\n          --health-cmd=\"mysqladmin ping -h localhost\"\n          --health-interval=10s\n          --health-timeout=5s\n          --health-retries=3\n        ports:\n          - 3306:3306\n\n    steps:\n      - name: Checkout code\n        uses: actions/checkout@v4\n        with:\n          fetch-depth: 0  # Full history for comparison\n\n      - name: Setup Node.js\n        uses: actions/setup-node@v4\n        with:\n          node-version: '20'\n          cache: 'pnpm'\n\n      - name: Install pnpm\n        uses: pnpm/action-setup@v2\n        with:\n          version: 10\n\n      - name: Install dependencies\n        run: pnpm install --frozen-lockfile\n\n      - name: Setup database\n        run: |\n          pnpm db:push\n        env:\n          DATABASE_URL: mysql://root:root@localhost:3306/test_db\n\n      - name: Build application\n        run: pnpm build\n        env:\n          NODE_ENV: production\n\n      - name: Start dev server\n        run: |\n          timeout 120 npm run dev > /tmp/server.log 2>&1 &\n          # Wait for server to start\n          for i in {1..30}; do\n            if curl -s http://localhost:3000 > /dev/null; then\n              echo \"Server started successfully\"\n              exit 0\n            fi\n            echo \"Waiting for server... ($i/30)\"\n            sleep 2\n          done\n          echo \"Server failed to start\"\n          cat /tmp/server.log\n          exit 1\n\n      - name: Run baseline performance test\n        run: |\n          npx artillery run load-tests/baseline.yml -o /tmp/baseline.json\n        env:\n          NODE_ENV: test\n\n      - name: Run stress performance test\n        run: |\n          npx artillery run load-tests/stress.yml -o /tmp/stress.json\n        env:\n          NODE_ENV: test\n\n      - name: Generate performance reports\n        if: always()\n        run: |\n          npx artillery report /tmp/baseline.json -o /tmp/baseline.html\n          npx artillery report /tmp/stress.json -o /tmp/stress.html\n\n      - name: Validate SLA compliance\n        run: |\n          node scripts/validate-sla.js /tmp/baseline.json /tmp/stress.json\n\n      - name: Compare with baseline\n        if: github.event_name == 'pull_request'\n        run: |\n          node scripts/compare-performance.js \\\n            --current /tmp/baseline.json \\\n            --baseline main \\\n            --threshold 10\n        continue-on-error: true\n\n      - name: Upload performance artifacts\n        if: always()\n        uses: actions/upload-artifact@v4\n        with:\n          name: performance-reports\n          path: |\n            /tmp/baseline.json\n            /tmp/stress.json\n            /tmp/baseline.html\n            /tmp/stress.html\n          retention-days: 30\n\n      - name: Store metrics in database\n        if: always()\n        run: |\n          node scripts/store-metrics.js \\\n            --baseline /tmp/baseline.json \\\n            --stress /tmp/stress.json \\\n            --commit ${{ github.sha }} \\\n            --branch ${{ github.ref_name }}\n        env:\n          METRICS_DB_URL: ${{ secrets.METRICS_DB_URL }}\n\n      - name: Comment PR with results\n        if: github.event_name == 'pull_request' && always()\n        uses: actions/github-script@v7\n        with:\n          script: |\n            const fs = require('fs');\n            const baseline = JSON.parse(fs.readFileSync('/tmp/baseline.json', 'utf8'));\n            const stress = JSON.parse(fs.readFileSync('/tmp/stress.json', 'utf8'));\n            \n            const comment = `## Performance Test Results\n            \n            ### Baseline Test (1 RPS)\n            - Requests: ${baseline.aggregate.scenarioCount}\n            - P50: ${baseline.aggregate.latency.p50}ms\n            - P95: ${baseline.aggregate.latency.p95}ms\n            - P99: ${baseline.aggregate.latency.p99}ms\n            - Success Rate: ${((baseline.aggregate.codes['2xx'] / baseline.aggregate.scenarioCount) * 100).toFixed(2)}%\n            \n            ### Stress Test (100 RPS)\n            - Requests: ${stress.aggregate.scenarioCount}\n            - P50: ${stress.aggregate.latency.p50}ms\n            - P95: ${stress.aggregate.latency.p95}ms\n            - P99: ${stress.aggregate.latency.p99}ms\n            - Success Rate: ${((stress.aggregate.codes['2xx'] / stress.aggregate.scenarioCount) * 100).toFixed(2)}%\n            \n            [View detailed reports](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;\n            \n            github.rest.issues.createComment({\n              issue_number: context.issue.number,\n              owner: context.repo.owner,\n              repo: context.repo.repo,\n              body: comment\n            });\n\n      - name: Notify Slack on failure\n        if: failure()\n        uses: slackapi/slack-github-action@v1.24.0\n        with:\n          payload: |\n            {\n              \"text\": \"Performance Test Failed\",\n              \"blocks\": [\n                {\n                  \"type\": \"section\",\n                  \"text\": {\n                    \"type\": \"mrkdwn\",\n                    \"text\": \"*Performance Test Failed* 🔴\\n*Repository:* ${{ github.repository }}\\n*Branch:* ${{ github.ref_name }}\\n*Commit:* ${{ github.sha }}\\n*Run:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Details>\"\n                  }\n                }\n              ]\n            }\n        env:\n          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}\n          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK\n\n      - name: Fail if SLA violated\n        if: failure()\n        run: |\n          echo \"Performance SLA violated. Check the reports above.\"\n          exit 1\n
